name: CI

on:
  push:
  pull_request:

jobs:
  moon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: moon version
        run: moon version --all

      - name: moon fmt
        run: moon fmt

      - name: check formatting
        run: git diff --exit-code

      - name: moon check
        run: moon check --deny-warn

      - name: moon info --deny-warn
        run: |
          if moon info --help | grep -q -- '--deny-warn'; then
            moon info --deny-warn
          else
            moon info
          fi

      - name: check generated interfaces
        run: git diff --exit-code

      - name: moon test
        run: moon test --deny-warn

      - name: build wasm export
        run: moon build --target wasm-gc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: wasm smoke test
        run: node mold_live_smoke.mjs
