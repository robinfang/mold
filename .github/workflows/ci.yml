name: CI

on:
  push:
  pull_request:

jobs:
  moon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: moon version
        run: moon version --all

      - name: moon fmt --check
        run: moon fmt --check

      - name: moon check
        run: moon check

      - name: moon test
        run: moon test

      - name: build wasm export
        run: moon build --target wasm-gc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: wasm smoke test
        run: node mold_live_smoke.mjs
