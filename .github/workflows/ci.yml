name: CI

on:
  push:
  pull_request:

jobs:
  moon:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: install MoonBit on Unix
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: install MoonBit on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: post install
        run: |
          moon version --all
          moon update

      - name: moon check
        run: moon check --target all --deny-warn

      - name: moon test
        run: moon test --target all --deny-warn

      - name: lint
        run: |
          moon fmt
          git diff --exit-code
          moon info
          git diff --exit-code

      - name: build wasm export
        run: moon build --target wasm-gc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: wasm smoke test
        run: node mold_live_smoke.mjs
